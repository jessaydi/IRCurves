name: .NET CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@aa983c550dfda0d1722b6ac6aed55724ffacc6d3 # v3.1.0
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@13aacd865c20de90d75de3b17ebe84f7a17d57d2 # v4.0.0
        with:
          path: ~/.nuget/packages
          key: nuget-packages-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-packages-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore TermStructure/TermStructure.csproj

      - name: Build main library
        run: dotnet build TermStructure/TermStructure.csproj --configuration Release --no-restore

      - name: Build tests
        run: dotnet build TermStructure.Tests/TermStructure.Tests.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test TermStructure.Tests/TermStructure.Tests.csproj --configuration Release --no-restore --verbosity minimal
